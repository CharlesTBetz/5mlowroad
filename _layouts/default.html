<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO, Open Graph, and sitemap metadata (jekyll-seo-tag) -->
  {% seo %}

  <!-- Typography: EB Garamond for body, Gill Sans system stack for headers -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- TODO: analytics — uncomment and configure when ready (Plausible or GA4).
  <script defer data-domain="5mlowroad.com" src="https://plausible.io/js/script.js"></script>
  -->
</head>
<body>
  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    // Minimal vanilla JS: mobile nav toggle
    (function () {
      var toggle = document.querySelector('.nav-toggle');
      var menu = document.getElementById('site-nav-menu');
      if (!toggle || !menu) return;
      toggle.addEventListener('click', function () {
        var open = menu.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    })();
  </script>
</body>
</html>
