<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO, Open Graph, and sitemap metadata (jekyll-seo-tag) -->
  {% seo %}

  <!-- Social share image (Open Graph + Twitter) -->
  <meta property="og:image" content="{{ '/assets/images/og-image.jpg' | absolute_url }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ '/assets/images/og-image.jpg' | absolute_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/favicon.png' | relative_url }}">

  <!-- Typography: Cinzel (show title), Cormorant Garamond (display), EB Garamond (body); Gill Sans is a system stack -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- TODO: analytics — uncomment and configure when ready (Plausible or GA4).
  <script defer data-domain="5mlowroad.com" src="https://plausible.io/js/script.js"></script>
  -->
</head>
<body>
  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    // Minimal vanilla JS: mobile nav toggle
    (function () {
      var toggle = document.querySelector('.nav-toggle');
      var menu = document.getElementById('site-nav-menu');
      if (!toggle || !menu) return;
      toggle.addEventListener('click', function () {
        var open = menu.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    })();

    // Click-to-load YouTube facades: inject the iframe only on click
    document.addEventListener('click', function (e) {
      var btn = e.target.closest && e.target.closest('.yt-facade');
      if (!btn) return;
      var id = btn.getAttribute('data-yt-id');
      var iframe = document.createElement('iframe');
      iframe.className = 'yt-iframe';
      iframe.src = 'https://www.youtube-nocookie.com/embed/' + id + '?autoplay=1&rel=0';
      iframe.title = btn.getAttribute('aria-label') || 'YouTube video';
      iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
      iframe.allowFullscreen = true;
      btn.replaceWith(iframe);
    });
  </script>
</body>
</html>
