---
layout: default
---
<article class="page listen-page">
  {% if page.title %}
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  {% endif %}

  <!-- Audio-focused layout: wider player area, generous spacing -->
  <div class="listen-content">
    {{ content }}
  </div>
</article>
