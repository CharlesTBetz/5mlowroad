{% comment %}
  Reusable HTML5 audio player.
  Usage:
    {% include audio-player.html src="/assets/audio/song-name.mp3" title="Song Title" %}
  Leave src as a placeholder path until the real MP3 is dropped into /assets/audio/.
{% endcomment %}
<div class="audio-player">
  {% if include.title %}<p class="audio-player-title">{{ include.title }}</p>{% endif %}
  <!-- TODO: replace src with the real file in /assets/audio/ -->
  <audio controls preload="none" class="audio-player-el">
    <source src="{{ include.src | default: '/assets/audio/placeholder.mp3' | relative_url }}" type="audio/mpeg">
    Your browser does not support the audio element.
    <a href="{{ include.src | relative_url }}">Download the track</a>.
  </audio>
</div>
